# 8B prime-rl config for a 2-GPU Prime pod (1 infer + 1 train).
# Monolithic schema — `rl` auto-splits at launch. Schema matches
# current prime-rl (post-2026-02 renames: `train.sampling`,
# `train.env`, `max_completion_tokens`).
#
# Launch from inside a prime-rl checkout:
#   uv run rl @ /path/to/this/toml \
#     --tokenizer.chat_template /path/to/templates/completion.jinja

max_steps = 200
seq_len = 512

[model]
name = "unsloth/Meta-Llama-3.1-8B"

[orchestrator]
batch_size = 128
rollouts_per_example = 4

[orchestrator.train.sampling]
max_completion_tokens = 12
temperature = 0.9

[[orchestrator.train.env]]
id = "swyperloom"

[trainer.model.lora]
rank = 16
alpha = 32.0
dropout = 0.05
target_modules = ["q_proj", "k_proj", "v_proj", "o_proj"]

[trainer.optim]
lr = 1e-4

[ckpt]
interval = 100

[inference]

[deployment]
type = "single_node"
num_train_gpus = 1
num_infer_gpus = 1
