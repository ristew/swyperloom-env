# Pod prime-rl config for Llama-3.1-8B base. Native prime-rl schema
# (same as `examples/*/rl.toml` in the prime-rl repo). Launch with
# `uv run rl @ configs/rl/swyperloom.toml` from inside a prime-rl checkout
# that has this env installed via `uv pip install -e /path/to/this/dir`.

max_steps = 200
seq_len = 512

[model]
name = "meta-llama/Llama-3.1-8B"

[orchestrator]
batch_size = 128
rollouts_per_example = 4

[orchestrator.sampling]
max_tokens = 12
temperature = 0.9

[[orchestrator.env]]
id = "swyperloom"

[trainer.model.lora]
rank = 16
alpha = 32.0
dropout = 0.05
target_modules = ["q_proj", "k_proj", "v_proj", "o_proj"]

[trainer.optim]
lr = 1e-4

[ckpt]

[inference]
