# Local prime-rl config for Llama-3.2-1B. Schema matches the
# `examples/reverse_text/rl.toml` style in the prime-rl repo — launched
# via `uv run rl @ ...` from inside a prime-rl checkout, NOT via
# `prime rl run` (which targets the hosted service).

max_steps = 20
seq_len = 512

[model]
name = "meta-llama/Llama-3.2-1B"

[orchestrator]
batch_size = 16
rollouts_per_example = 4

[orchestrator.sampling]
max_tokens = 12
temperature = 0.9

[[orchestrator.env]]
id = "swyperloom"

[trainer.model.lora]
rank = 16
alpha = 32.0
dropout = 0.05
target_modules = ["q_proj", "k_proj", "v_proj", "o_proj"]

[trainer.optim]
lr = 1e-4

[ckpt]

[inference]
