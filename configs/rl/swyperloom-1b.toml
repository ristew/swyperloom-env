# Smaller config for a local GPU dry-run on Llama-3.2-1B.
# Tests the full GRPO loop (rollouts + judge + reward + LoRA step) end to
# end before committing to an 8B pod run. Fits on a single 8-12GB GPU
# (e.g. a 3060, 4070, older-gen cards); drop batch_size further if OOM.

model = "meta-llama/Llama-3.2-1B"
max_steps = 20
batch_size = 16
rollouts_per_example = 4

env_file = ["../../secrets.env"]

[sampling]
max_tokens = 12
temperature = 0.9

[[env]]
id = "swyperloom"
